# File-size gate — per ~/.claude/rules/code-modularity-standards.md
# Enforces 500-line file cap. Allow-list at .file-size-allow-list (one path per line).
name: file-size-gate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  size-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check file sizes
        shell: bash
        run: |
          set -euo pipefail
          ALLOW_LIST=.file-size-allow-list
          touch "$ALLOW_LIST"

          OFFENDERS=$(
            find . -type f \
              \( -name '*.py' -o -name '*.ts' -o -name '*.tsx' -o -name '*.js' -o -name '*.jsx' -o -name '*.rs' -o -name '*.go' -o -name '*.swift' \) \
              -not -path './.git/*' \
              -not -path '*/node_modules/*' \
              -not -path '*/.venv/*' \
              -not -path '*/venv/*' \
              -not -path '*/__pycache__/*' \
              -not -path '*/build/*' \
              -not -path '*/dist/*' \
              -not -path '*/target/*' \
              -not -path '*/_generated/*' \
              -exec wc -l {} + \
            | awk '$1 > 500 {print $2 " (" $1 " lines)"}' \
            | grep -vFf "$ALLOW_LIST" 2>/dev/null \
            || true
          )

          if [ -n "$OFFENDERS" ]; then
            echo "::error::Files exceeding 500-line cap (per code-modularity-standards):"
            echo "$OFFENDERS"
            echo ""
            echo "Fix: decompose along natural seams (SRP) OR add to .file-size-allow-list with one-line justification."
            exit 1
          fi

          echo "All source files within 500-line cap."
