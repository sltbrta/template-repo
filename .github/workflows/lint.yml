# Full Python quality toolchain - per ~/.claude/rules/quality-toolchain-pre-merge.md
# Ruff (lint+format) + mypy (types) + bandit (security SAST) + pip-audit (deps).
# NOTE: superseded by quality.yml for projects using uv. This workflow exists for
# projects that prefer pip-based installs over uv. Either-or; not both — the
# job-level guard below ensures lint.yml only runs when uv.lock is absent.
name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-stack:
    # Skip when uv.lock is present (uv-managed project — quality.yml takes over).
    # Pip-only projects (no uv.lock) keep this workflow as their gate.
    if: ${{ hashFiles('uv.lock') == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (pinned from .python-version)
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install quality stack (exact pins per hermetic-builds.md)
        run: |
          pip install --quiet \
            "ruff==0.8.0" \
            "mypy==1.13.0" \
            "bandit[toml]==1.7.10" \
            "pip-audit==2.7.3"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy . --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # TEMPLATE: remove continue-on-error after type debt cleaned

      - name: Bandit security scan
        run: bandit -r . -c pyproject.toml -q

      - name: Pip-audit dependency vulnerabilities
        run: pip-audit
        continue-on-error: true  # TEMPLATE: remove continue-on-error once real deps are declared
