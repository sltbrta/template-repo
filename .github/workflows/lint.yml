# Full Python quality toolchain — per ~/.claude/rules/quality-toolchain-pre-merge.md
# Ruff (lint+format) + mypy (types) + bandit (security SAST) + pip-audit (deps).
# NOTE: superseded by quality.yml for projects using uv. This workflow exists for
# projects that prefer pip-based installs over uv. Either-or; not both.
name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (pinned from .python-version)
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install quality stack
        run: |
          pip install --quiet \
            "ruff>=0.5" \
            "mypy>=1.10" \
            "bandit[toml]>=1.7" \
            "pip-audit>=2.7"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy . --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # TEMPLATE: remove continue-on-error after type debt cleaned

      - name: Bandit security scan
        run: bandit -r . -c pyproject.toml -q

      - name: Pip-audit dependency vulnerabilities
        run: pip-audit
        continue-on-error: true  # TEMPLATE: remove continue-on-error once real deps are declared
